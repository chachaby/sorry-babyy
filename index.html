<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            color: white;
            text-align: center;
            padding: 50px;
            overflow: hidden;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
        }

        h1 {
            margin-bottom: 20px;
        }

        #message {
            font-size: 18px;
            min-height: 80px;
            margin: 20px 0;
        }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            background-color: #ff4b4b;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 3s linear forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-300px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Untuk Kamu ❤️</h1>

    <div id="message">Klik hati ini ya...</div>

    <button onclick="showLove()">❤️</button>
</div>

<script>
    const messages = [
        "Aku mau bilang sesuatu...",
        "Makasih ya udah nemenin aku waktu lagi sakit 🤍",
        "Perhatian kamu bikin aku ngerasa berharga sungguh baby",
        "Aku emg ga pandai mengungkapkan betapa hadirmu meruntuhkan sakitku",
        "Perhatianmu melebihi segalanya yang bisa kuutarakan baby",
        "Aku beruntung banget punya kamu 💚",
        "Semoga aku bisa selalu ada buat kamu juga",
        "Aku sayang kamu Alfin Lambok Kristiano Silitonga❤️"
    ];

    let index = 0;

    function showLove() {
        // tampilkan pesan
        if (index < messages.length) {
            document.getElementById("message").innerText = messages[index];
            index++;
        } else {
            document.getElementById("message").innerText = "Sayangku ke kamu nggak akan habis ❤️";
        }

        // bikin efek love bertebaran
        for (let i = 0; i < 15; i++) {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerText = "❤️";

            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = window.innerHeight + "px";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    }
</script>

</body>
</html>
